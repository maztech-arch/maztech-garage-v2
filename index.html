let state=load();

let syncBusy=false;
function apiUrl(action,params={}){
  if(!CONFIG.API_URL)return '';
  const u=new URL(CONFIG.API_URL);
  u.searchParams.set('action',action);
  u.searchParams.set('t',Date.now());
  Object.keys(params||{}).forEach(k=>u.searchParams.set(k,params[k]));
  return u.toString();
}
async function apiGet(action,params={}){
  const url=apiUrl(action,params);
  if(!url)throw new Error('ยังไม่ได้ใส่ CONFIG.API_URL');
  const res=await fetch(url,{method:'GET',cache:'no-store'});
  if(!res.ok)throw new Error('HTTP '+res.status);
  const json=await res.json();
  if(json&&json.ok===false)throw new Error(json.error||'API error');
  return json.data||json;
}
function applyApiState(payload){
  if(!payload)return;
  if(payload.dashboard)state.dashboard=payload.dashboard;
  if(payload.settings)state.settings={...state.settings,...payload.settings};
  if(Array.isArray(payload.parts))state.parts=payload.parts;
  if(Array.isArray(payload.customers))state.customers=payload.customers;
  if(Array.isArray(payload.vehicles))state.vehicles=payload.vehicles;
  if(Array.isArray(payload.jobs))state.jobs=payload.jobs;
  if(Array.isArray(payload.cashflow))state.cashflow=payload.cashflow;
  if(Array.isArray(payload.logs))state.logs=payload.logs;
  hydrateRelations();

function safeId(prefix,text){return prefix+'-'+String(text||Math.random()).replace(/[^\wก-๙]+/g,'').slice(0,18)}
function hydrateRelations(){
  state.jobs=(state.jobs||[]).map((j,i)=>({...j,id:j.id||j.jobNo||safeId('JOB',i),items:Array.isArray(j.items)?j.items:[]}));
  state.customers=Array.isArray(state.customers)?state.customers:[];
  state.vehicles=Array.isArray(state.vehicles)?state.vehicles:[];
  state.jobs.forEach(j=>{
    if(!j.customerId)j.customerId=safeId('C',j.phone||j.customerName||j.id);
    if(!state.customers.find(c=>c.id===j.customerId)){
      state.customers.push({id:j.customerId,name:j.customerName||j.custName||'-',phone:j.phone||'-',line:j.line||'-',type:j.customerType||'ทั่วไป'});
    }
    if(!j.vehicleId)j.vehicleId=safeId('V',j.plate||j.licensePlate||j.id);
    if(!state.vehicles.find(v=>v.id===j.vehicleId)){
      state.vehicles.push({id:j.vehicleId,customerId:j.customerId,plate:j.plate||j.licensePlate||'-',brand:'Mazda',model:j.model||j.carModel||'-',year:j.year||'',vin:j.vin||'',color:j.color||'',mileage:num(j.mileage)});
    }
  });
}

  <div class="card"><div class="card-head"><div class="card-title">Part Master</div><input id="partQ" oninput="renderPartsTable()" placeholder="ค้นหาอะไหล่ / Part No" style="padding:7px 10px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc"></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Part No</th><th>รายการ</th><th>ประเภท</th><th>Supplier</th><th>หน่วย</th><th class="right">ต้นทุน</th><th class="right">ขาย</th><th class="right">สต๊อก</th><th class="right">GP%</th><th>จัดการ</th></tr></thead><tbody id="partsTable">${partsRows()}</tbody></table></div></div>`},
  customers(){return `<div class="page-head"><div><div class="page-title">ลูกค้า / รถ</div><div class="page-sub">ค้นหาประวัติลูกค้าและรถจากทะเบียนหรือเบอร์โทร</div></div><div class="actions"><button class="btn primary" onclick="go('newjob')">+ เพิ่มจากการเปิดจ๊อบ</button><button class="btn out" onclick="exportCSV('customers')">Export ลูกค้า</button></div></div>

  cashflow(){return `<div class="page-head"><div><div class="page-title">รายรับ-รายจ่าย</div><div class="page-sub">ระบบ 2 บัญชี: ${state.settings.account1} และ ${state.settings.account2}</div></div><div class="actions"><button class="btn primary" onclick="openCashflowForm()">+ เพิ่มรายการ</button><button class="btn out" onclick="exportCSV('cashflow')">Export CSV</button></div></div>
    <div class="grid kpi-grid">${kpi('🏦',state.settings.account1,money(accountBal(state.settings.account1)),'ยอดคงเหลือ','#1e6fc4','#dbeafe')}${kpi('🏦',state.settings.account2,money(accountBal(state.settings.account2)),'ยอดคงเหลือ','#7c3aed','#ede9fe')}${kpi('⬆️','เงินเข้า',money(sumCF('IN')),'รวมทุกบัญชี','#059669','#d1fae5')}${kpi('⬇️','เงินออก',money(sumCF('OUT')),'รวมทุกบัญชี','#dc2626','#fee2e2')}</div>
    <div class="card"><div class="card-head"><div class="card-title">รายการเคลื่อนไหวเงินสด/ธนาคาร</div></div><div class="table-wrap"><table class="data-table"><thead><tr><th>วันที่</th><th>บัญชี</th><th>ประเภท</th><th>หมวดหมู่</th><th>รายละเอียด</th><th>Ref</th><th class="right">เงินเข้า</th><th class="right">เงินออก</th><th class="right">Signed</th><th>จัดการ</th></tr></thead><tbody id="cfTable"></tbody></table></div></div>`},
  reports(){const revenue=state.jobs.reduce((s,j)=>s+jobTotal(j),0), cost=state.jobs.reduce((s,j)=>s+jobCost(j),0), fixed=state.cashflow.filter(x=>x.direction==='OUT'&&['ค่าเช่า','เงินเดือน','ค่าน้ำไฟ'].includes(x.category)).reduce((s,x)=>s+num(x.amount),0), net=revenue-cost-fixed, reserve=net*state.settings.reservePct/100;return `<div class="page-head"><div><div class="page-title">รายงาน / Export</div><div class="page-sub">สรุปสำหรับหุ้นส่วน: P&L เบื้องต้น, เงินสำรอง และปันผลโดยประมาณ</div></div><div class="actions"><button class="btn out" onclick="window.print()">พิมพ์รายงาน</button><button class="btn primary" onclick="exportJSON()">สำรองข้อมูล JSON</button></div></div>
  <div class="card"><div class="card-head"><div class="card-title">รายงานผลประกอบการเบื้องต้น</div><div class="page-sub">คำนวณจากงานซ่อมและ Cashflow ในระบบ</div></div><div class="card-body"><div class="grid" style="grid-template-columns:1fr 1fr;gap:18px"><div>${moneyRows([['ยอดขายจากงานซ่อม',revenue],['ต้นทุนอะไหล่/บริการ',cost],['กำไรขั้นต้น',revenue-cost],['ค่าใช้จ่ายประจำที่บันทึก',fixed],['กำไรสุทธิเบื้องต้น',net]])}</div><div>${moneyRows([['เงินสำรอง '+state.settings.reservePct+'%',reserve],['กำไรก่อนแบ่งหลังสำรอง',net-reserve],['หุ้นส่วน 4 คน / คน',(net-reserve)/4],['ลูกหนี้ค้างรับ',state.jobs.reduce((s,j)=>s+Math.max(0,jobTotal(j)-num(j.paidAmount)),0)],['เงินคงเหลือบัญชี',sumCF('IN')-sumCF('OUT')]])}</div></div></div></div>
  <div class="card"><div class="card-head"><div class="card-title">สรุปยอดตามรุ่นรถ</div></div><div class="table-wrap"><table class="data-table"><thead><tr><th>รุ่นรถ</th><th class="right">จำนวนงาน</th><th class="right">ยอดขาย</th><th class="right">กำไรขั้นต้น</th></tr></thead><tbody>${modelReportRows()}</tbody></table></div></div>`},
  audit(){return `<div class="page-head"><div><div class="page-title">Audit Log</div><div class="page-sub">บันทึกการทำงานสำคัญในระบบ</div></div><button class="btn danger" onclick="clearLogs()">ล้าง Log</button></div><div class="card"><div class="table-wrap"><table class="data-table"><thead><tr><th>เวลา</th><th>รายการ</th></tr></thead><tbody>${state.logs.map(l=>`<tr><td>${l.at}</td><td>${l.text}</td></tr>`).join('')||'<tr><td colspan="2" class="empty">ไม่มีข้อมูล</td></tr>'}</tbody></table></div></div>`},
  settings(){return `<div class="page-head"><div><div class="page-title">ตั้งค่าระบบ</div><div class="page-sub">ค่าพื้นฐานสำหรับใช้งานจริง</div></div></div><form class="card" onsubmit="saveSettings(event)"><div class="card-head"><div class="card-title">ข้อมูลระบบ</div></div><div class="card-body"><div class="form-grid">${fieldVal('ชื่ออู่','company',state.settings.company)}${fieldVal('Prefix เลข Job','jobPrefix',state.settings.jobPrefix)}${fieldVal('บัญชีรับเงิน','account1',state.settings.account1)}${fieldVal('บัญชีจ่ายเงิน','account2',state.settings.account2)}${fieldVal('VAT %','taxRate',state.settings.taxRate,'number')}${fieldVal('เงินสำรองก่อนปันผล %','reservePct',state.settings.reservePct,'number')}</div><div class="actions" style="margin-top:14px"><button class="btn primary" type="submit">บันทึกตั้งค่า</button><button class="btn out" type="button" onclick="exportJSON()">สำรองข้อมูล</button><button class="btn warn" type="button" onclick="importJSONPrompt()">นำเข้า JSON</button><button class="btn danger" type="button" onclick="resetDemo()">รีเซ็ตข้อมูลตัวอย่าง</button></div></div></form>`}

function kpi(icon,label,val,note,c,ib){return `<div class="kpi" style="--c:${c};--ib:${ib}"><div class="kpi-icon">${icon}</div><div class="kpi-label">${label}</div><div class="kpi-value">${val}</div><div class="kpi-note">${note}</div></div>`}
function jobRowMini(j){const c=customer(j.customerId),v=vehicle(j.vehicleId);return `<tr><td><a class="job-link" onclick="selectJob('${j.id}')">${j.id}</a></td><td><span class="plate">${v.plate}</span></td><td>${c.name}</td><td>${statusBadge(j.status)}</td><td>${payBadge(j.payment)}</td><td class="right">${money(jobTotal(j))}</td></tr>`}
function renderJobTable(){const el=document.getElementById('jobTable');if(!el)return;const q=(document.getElementById('fQ')?.value||'').toLowerCase(), st=document.getElementById('fStatus')?.value||'', py=document.getElementById('fPay')?.value||'', mech=(document.getElementById('fMech')?.value||'').toLowerCase();let rows=state.jobs.filter(j=>{const c=customer(j.customerId),v=vehicle(j.vehicleId);const hay=[j.id,c.name,c.phone,v.plate,v.model,j.symptom].join(' ').toLowerCase();return (!q||hay.includes(q))&&(!st||j.status===st)&&(!py||j.payment===py)&&(!mech||(j.mechanic||'').toLowerCase().includes(mech))});document.getElementById('jobCount').textContent=`แสดง ${rows.length} จาก ${state.jobs.length} รายการ`;el.innerHTML=rows.slice().reverse().map(j=>{const c=customer(j.customerId),v=vehicle(j.vehicleId);return `<tr><td><a class="job-link" onclick="selectJob('${j.id}')">${j.id}</a></td><td>${thDate(j.dateIn)}</td><td><span class="plate">${v.plate}</span></td><td>${v.model}</td><td>${c.name}</td><td>${c.phone}</td><td style="max-width:190px;white-space:normal">${j.symptom||'-'}</td><td class="right">${money(jobTotal(j))}</td><td class="right">${money(j.paidAmount)}</td><td>${statusBadge(j.status)}</td><td>${payBadge(j.payment)}</td><td>${j.mechanic||'-'}</td><td><button class="btn out sm" onclick="selectJob('${j.id}')">ดู</button> <button class="btn warn sm" onclick="changeJobStatus('${j.id}')">สถานะ</button></td></tr>`}).join('')||'<tr><td colspan="13" class="empty">ไม่พบข้อมูล</td></tr>'}
function clearJobFilters(){['fQ','fStatus','fPay','fMech'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=''});renderJobTable()}
function createJob(e){e.preventDefault();const f=new FormData(e.target), cName=f.get('custName').trim(), phone=f.get('phone').trim(), plate=f.get('plate').trim(); if(!cName||!phone||!plate){toast('กรุณากรอกชื่อ เบอร์ และทะเบียน');return} let c=state.customers.find(x=>x.phone===phone)||{id:uid('C'),name:cName,phone,line:f.get('line'),type:f.get('custType')}; Object.assign(c,{name:cName,phone,line:f.get('line'),type:f.get('custType')}); if(!state.customers.find(x=>x.id===c.id))state.customers.push(c); let v=state.vehicles.find(x=>x.plate===plate)||{id:uid('V'),customerId:c.id,plate}; Object.assign(v,{customerId:c.id,plate,brand:'Mazda',model:f.get('model'),year:f.get('year'),mileage:num(f.get('mileage')),vin:'-',color:'-'}); if(!state.vehicles.find(x=>x.id===v.id))state.vehicles.push(v); const partId=(f.get('itemPart')||'').split('|')[0], p=part(partId), qty=num(f.get('qty'))||1, sell=num(f.get('sell'))||num(p?.sell); const id=nextJobId(); const job={id,dateIn:f.get('dateIn')||today(),dueDate:f.get('dueDate')||'',dateOut:'',customerId:c.id,vehicleId:v.id,status:f.get('status'),payment:f.get('payment'),paidAmount:num(f.get('paidAmount')),mechanic:f.get('mechanic'),symptom:f.get('symptom'),diagnosis:f.get('diagnosis'),internalNote:f.get('internalNote'),items:[]}; if(p)job.items.push({partId:p.id,name:p.name,qty,cost:p.cost,sell,type:p.type}); state.jobs.push(job); if(job.paidAmount>0)addCF({date:job.dateIn,account:state.settings.account1,direction:'IN',category:'รายรับ-งานซ่อม',desc:'รับชำระ '+job.id,amount:job.paidAmount,ref:job.id},false); state.selectedJobId=id;log('เปิดจ๊อบใหม่ '+id+' ทะเบียน '+plate);save();toast('เปิดจ๊อบสำเร็จ '+id);go('detail')}
function nextJobId(){const d=new Date(), yy=String(d.getFullYear()+543).slice(-2), mm=String(d.getMonth()+1).padStart(2,'0'); const prefix=`${state.settings.jobPrefix}-${yy}${mm}-`; const max=state.jobs.filter(j=>j.id.startsWith(prefix)).map(j=>num(j.id.split('-').pop())).reduce((a,b)=>Math.max(a,b),0)+1; return prefix+String(max).padStart(4,'0')}
function itemRow(j,it,idx){const totalCost=num(it.qty)*num(it.cost), totalSell=num(it.qty)*num(it.sell), gp=totalSell?((totalSell-totalCost)/totalSell*100).toFixed(1):0;return `<tr><td>${it.name}</td><td><span class="badge ${it.type==='แท้'?'b-blue':it.type==='บริการ'?'b-green':'b-orange'}">${it.type||'-'}</span></td><td class="right">${it.qty}</td><td class="right">${money(it.cost)}</td><td class="right">${money(it.sell)}</td><td class="right">${money(totalCost)}</td><td class="right">${money(totalSell)}</td><td class="right ${gp<10?'down':'up'}">${gp}%</td><td><button class="btn danger sm" onclick="removeItem('${j.id}',${idx})">ลบ</button></td></tr>`}
function openAddItem(jobId){const opts=state.parts.map(p=>`<option value="${p.id}">${p.partNo} — ${p.name} | สต๊อก ${p.stock}</option>`).join('');openModal('เพิ่มรายการอะไหล่/บริการ',`<form onsubmit="addItem(event,'${jobId}')"><div class="form-grid"><div class="field span-2"><label>เลือกอะไหล่ / บริการ</label><select name="partId" onchange="fillPartPrice(this)">${opts}</select></div><div class="field"><label>จำนวน</label><input name="qty" type="number" value="1" min="0.01" step="0.01"></div><div class="field"><label>ราคาขาย/หน่วย</label><input name="sell" id="modalSell" type="number" value="${state.parts[0]?.sell||0}"></div></div><div class="actions" style="margin-top:14px"><button class="btn primary">เพิ่มรายการ</button></div></form>`)}
function fillPartPrice(sel){const p=part(sel.value);document.getElementById('modalSell').value=p?p.sell:0}
function addItem(e,jobId){e.preventDefault();const f=new FormData(e.target), p=part(f.get('partId')), j=state.jobs.find(x=>x.id===jobId); if(!p||!j)return; const qty=num(f.get('qty'))||1; j.items.push({partId:p.id,name:p.name,qty,cost:p.cost,sell:num(f.get('sell'))||p.sell,type:p.type}); if(p.type!=='บริการ')p.stock=Math.max(0,num(p.stock)-qty);log('เพิ่มรายการ '+p.name+' ใน '+jobId);save();closeModal();render();toast('เพิ่มรายการแล้ว')}
function removeItem(jobId,idx){const j=state.jobs.find(x=>x.id===jobId);if(!j)return;const [it]=j.items.splice(idx,1); const p=part(it.partId); if(p&&p.type!=='บริการ')p.stock+=num(it.qty);log('ลบรายการจาก '+jobId+': '+it.name);save();render();}
function changeJobStatus(jobId){const j=state.jobs.find(x=>x.id===jobId);if(!j)return;openModal('เปลี่ยนสถานะงาน',`<form onsubmit="saveJobStatus(event,'${jobId}')"><div class="form-grid"><div class="field span-2"><label>สถานะงาน</label><select name="status">${jobStatuses().map(s=>`<option ${j.status===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="field span-2"><label>สถานะชำระเงิน</label><select name="payment">${payStatuses().map(s=>`<option ${j.payment===s?'selected':''}>${s}</option>`).join('')}</select></div></div><div class="actions" style="margin-top:14px"><button class="btn primary">บันทึก</button></div></form>`)}
function saveJobStatus(e,jobId){e.preventDefault();const f=new FormData(e.target), j=state.jobs.find(x=>x.id===jobId);j.status=f.get('status');j.payment=f.get('payment');if(j.status==='ส่งมอบแล้ว'&&!j.dateOut)j.dateOut=today();log('เปลี่ยนสถานะ '+jobId+' เป็น '+j.status+' / '+j.payment);save();closeModal();render();toast('บันทึกสถานะแล้ว')}
function receivePayment(jobId){const j=state.jobs.find(x=>x.id===jobId);if(!j)return;const remain=Math.max(0,jobTotal(j)-num(j.paidAmount));openModal('บันทึกรับชำระ',`<form onsubmit="savePayment(event,'${jobId}')"><div class="form-grid">${fieldVal('วันที่รับเงิน','date',today(),'date')}${selectField('บัญชีรับเงิน','account',[state.settings.account1,state.settings.account2])}${fieldVal('ยอดรับชำระ','amount',remain,'number')}<div class="field"><label>หมายเหตุ</label><input name="desc" value="รับชำระ ${jobId}"></div></div><div class="actions" style="margin-top:14px"><button class="btn primary">บันทึกเงินรับ</button></div></form>`)}
function savePayment(e,jobId){e.preventDefault();const f=new FormData(e.target), j=state.jobs.find(x=>x.id===jobId), amount=num(f.get('amount')); j.paidAmount=num(j.paidAmount)+amount; j.payment=j.paidAmount>=jobTotal(j)?'ชำระครบ':'ชำระบางส่วน'; addCF({date:f.get('date'),account:f.get('account'),direction:'IN',category:'รายรับ-งานซ่อม',desc:f.get('desc'),amount,ref:jobId},false);log('รับชำระ '+jobId+' '+money(amount));save();closeModal();render();toast('รับชำระแล้ว')}
function deleteJob(id){if(!confirm('ลบงาน '+id+' ?'))return;state.jobs=state.jobs.filter(j=>j.id!==id);log('ลบงาน '+id);save();go('jobs')}
function duplicateJob(id){const old=state.jobs.find(j=>j.id===id);if(!old)return;const j=JSON.parse(JSON.stringify(old));j.id=nextJobId();j.dateIn=today();j.dateOut='';j.status='รับรถเข้า';j.payment='ยังไม่ชำระ';j.paidAmount=0;state.jobs.push(j);state.selectedJobId=j.id;log('ทำซ้ำงานจาก '+id+' เป็น '+j.id);save();render();toast('สร้างงานซ้ำแล้ว')}
function printJob(){window.print()}
function exportOneJob(id){const j=state.jobs.find(x=>x.id===id);download('job_'+id+'.json',JSON.stringify(j,null,2),'application/json')}
function partsRows(){const q=(document.getElementById('partQ')?.value||'').toLowerCase();return state.parts.filter(p=>!q||[p.partNo,p.name,p.type,p.supplier].join(' ').toLowerCase().includes(q)).map(p=>{const gp=p.sell?((p.sell-p.cost)/p.sell*100).toFixed(1):0;return `<tr><td class="mono">${p.partNo}</td><td>${p.name}</td><td><span class="badge ${p.type==='แท้'?'b-blue':p.type==='บริการ'?'b-green':'b-orange'}">${p.type}</span></td><td>${p.supplier}</td><td>${p.unit}</td><td class="right">${money(p.cost)}</td><td class="right">${money(p.sell)}</td><td class="right ${p.stock<=2&&p.type!=='บริการ'?'down':''}">${p.stock}</td><td class="right ${gp<10?'down':'up'}">${gp}%</td><td><button class="btn out sm" onclick="openPartForm('${p.id}')">แก้</button> <button class="btn warn sm" onclick="adjustStock('${p.id}')">สต๊อก</button></td></tr>`}).join('')||'<tr><td colspan="10" class="empty">ไม่พบข้อมูล</td></tr>'}
function renderPartsTable(){document.getElementById('partsTable').innerHTML=partsRows()}
function openPartForm(id){const p=id?part(id):{id:'',partNo:'',name:'',type:'แท้',unit:'ชิ้น',cost:0,sell:0,stock:0,supplier:''};openModal(id?'แก้ไขอะไหล่':'เพิ่มอะไหล่ใหม่',`<form onsubmit="savePart(event,'${id||''}')"><div class="form-grid">${fieldVal('Part No','partNo',p.partNo)}${fieldVal('ชื่อรายการ','name',p.name)}${selectField('ประเภท','type',['แท้','OEM','เทียบ','บริการ'])}${fieldVal('หน่วย','unit',p.unit)}${fieldVal('ต้นทุน','cost',p.cost,'number')}${fieldVal('ราคาขาย','sell',p.sell,'number')}${fieldVal('สต๊อก','stock',p.stock,'number')}${fieldVal('Supplier','supplier',p.supplier)}</div><div class="actions" style="margin-top:14px"><button class="btn primary">บันทึก</button></div></form>`)}
function savePart(e,id){e.preventDefault();const f=new FormData(e.target);let p=id?part(id):{id:uid('P')};Object.assign(p,{partNo:f.get('partNo'),name:f.get('name'),type:f.get('type'),unit:f.get('unit'),cost:num(f.get('cost')),sell:num(f.get('sell')),stock:num(f.get('stock')),supplier:f.get('supplier')});if(!id)state.parts.push(p);log((id?'แก้ไข':'เพิ่ม')+'อะไหล่ '+p.name);save();closeModal();render();toast('บันทึกอะไหล่แล้ว')}
function adjustStock(id){const p=part(id), val=prompt('ใส่จำนวนสต๊อกใหม่ของ '+p.name,p.stock); if(val===null)return;p.stock=num(val);log('ปรับสต๊อก '+p.name+' เป็น '+p.stock);save();render();}
function renderCustomerList(){const q=(document.getElementById('custQ')?.value||'').toLowerCase();const list=state.customers.filter(c=>{const vs=state.vehicles.filter(v=>v.customerId===c.id);return !q||[c.name,c.phone,c.line,c.type,...vs.map(v=>v.plate+' '+v.model)].join(' ').toLowerCase().includes(q)});document.getElementById('customerList').innerHTML=list.map(c=>{const vs=state.vehicles.filter(v=>v.customerId===c.id);return `<div class="card"><div class="card-head"><div><div class="card-title">${c.name} <span class="badge b-purple">${c.type}</span></div><div class="page-sub">${c.phone} · ${c.line||'-'}</div></div><button class="btn out sm" onclick="openEditCustomer('${c.id}')">แก้ไข</button></div><div class="table-wrap"><table class="data-table"><thead><tr><th>ทะเบียน</th><th>รุ่นรถ</th><th>ปี</th><th class="right">ไมล์</th><th class="right">จำนวนงาน</th><th class="right">ยอดซ่อม</th></tr></thead><tbody>${vs.map(v=>{const js=state.jobs.filter(j=>j.vehicleId===v.id);return `<tr><td><span class="plate">${v.plate}</span></td><td>${v.model}</td><td>${v.year}</td><td class="right">${Number(v.mileage||0).toLocaleString()}</td><td class="right">${js.length}</td><td class="right">${money(js.reduce((s,j)=>s+jobTotal(j),0))}</td></tr>`}).join('')}</tbody></table></div></div>`}).join('')||'<div class="empty">ไม่พบข้อมูล</div>'}
function openEditCustomer(id){const c=state.customers.find(x=>x.id===id);if(!c)return;openModal('แก้ไขลูกค้า',`<form onsubmit="saveCustomer(event,'${id}')"><div class="form-grid">${fieldVal('ชื่อ','name',c.name)}${fieldVal('เบอร์โทร','phone',c.phone)}${fieldVal('LINE','line',c.line)}${selectField('ประเภท','type',['ทั่วไป','ลูกค้าประจำ','VIP','Fleet'],c.type)}</div><div class="actions" style="margin-top:14px"><button class="btn primary">บันทึก</button></div></form>`)}
function saveCustomer(e,id){e.preventDefault();const f=new FormData(e.target),c=state.customers.find(x=>x.id===id);Object.assign(c,{name:f.get('name'),phone:f.get('phone'),line:f.get('line'),type:f.get('type')});log('แก้ไขลูกค้า '+c.name);save();closeModal();render();}
function accountBal(acc){return state.cashflow.filter(x=>x.account===acc).reduce((s,x)=>s+(x.direction==='IN'?num(x.amount):-num(x.amount)),0)}
function sumCF(dir){return state.cashflow.filter(x=>x.direction===dir).reduce((s,x)=>s+num(x.amount),0)}
function openCashflowForm(){openModal('เพิ่มรายรับ-รายจ่าย',`<form onsubmit="saveCF(event)"><div class="form-grid">${fieldVal('วันที่','date',today(),'date')}${selectField('บัญชี','account',[state.settings.account1,state.settings.account2])}${selectField('ประเภท','direction',['IN','OUT'])}${selectField('หมวดหมู่','category',['รายรับ-งานซ่อม','ขายอะไหล่','ทุนเริ่มต้น','ค่าเช่า','เงินเดือน','ค่าน้ำไฟ','ต้นทุน-อะไหล่','ค่าใช้จ่าย-การตลาด','ค่าใช้จ่าย-อื่นๆ','ถอนหุ้นส่วน'])}${fieldVal('จำนวนเงิน','amount',0,'number')}${fieldVal('Ref No','ref','')}${fieldVal('รายละเอียด','desc','')}</div><div class="actions" style="margin-top:14px"><button class="btn primary">บันทึก</button></div></form>`)}
function saveCF(e){e.preventDefault();const f=new FormData(e.target);addCF({date:f.get('date'),account:f.get('account'),direction:f.get('direction'),category:f.get('category'),desc:f.get('desc'),amount:num(f.get('amount')),ref:f.get('ref')},true);closeModal();render();toast('บันทึกรายการเงินแล้ว')}
function addCF(x,doSave=true){state.cashflow.push({id:uid('CF'),...x});if(doSave){log('เพิ่ม Cashflow '+x.direction+' '+money(x.amount)+' '+x.category);save();}}
function renderCashflowTable(){const el=document.getElementById('cfTable');el.innerHTML=state.cashflow.slice().reverse().map(x=>`<tr><td>${thDate(x.date)}</td><td>${x.account}</td><td>${x.direction==='IN'?'<span class="badge b-green">IN</span>':'<span class="badge b-red">OUT</span>'}</td><td>${x.category}</td><td>${x.desc||'-'}</td><td class="mono">${x.ref||'-'}</td><td class="right up">${x.direction==='IN'?money(x.amount):'-'}</td><td class="right down">${x.direction==='OUT'?money(x.amount):'-'}</td><td class="right mono">${money(x.direction==='IN'?x.amount:-x.amount)}</td><td><button class="btn danger sm" onclick="deleteCF('${x.id}')">ลบ</button></td></tr>`).join('')}
function deleteCF(id){if(!confirm('ลบรายการเงินนี้?'))return;state.cashflow=state.cashflow.filter(x=>x.id!==id);log('ลบรายการ Cashflow '+id);save();render();}
function modelReportRows(){const map={};state.jobs.forEach(j=>{const v=vehicle(j.vehicleId), k=v.model||'-';map[k]=map[k]||{n:0,sell:0,gp:0};map[k].n++;map[k].sell+=jobTotal(j);map[k].gp+=jobTotal(j)-jobCost(j)});return Object.entries(map).map(([k,v])=>`<tr><td>${k}</td><td class="right">${v.n}</td><td class="right">${money(v.sell)}</td><td class="right">${money(v.gp)}</td></tr>`).join('')}
function ownerSummary(revenue,cost,cfIn,cfOut,ar){const gross=revenue-cost, reserve=gross*state.settings.reservePct/100;return moneyRows([['ยอดขายงานซ่อม',revenue],['ต้นทุนงาน',cost],['กำไรขั้นต้น',gross],['เงินสำรอง '+state.settings.reservePct+'%',reserve],['ปันผลโดยประมาณ/คน',(gross-reserve)/4],['ลูกหนี้ค้างรับ',ar],['เงินสด/ธนาคาร',cfIn-cfOut]])}
function moneyRows(arr){return arr.map(([k,v],i)=>`<div class="rail-row"><span class="rail-key">${k}</span><span class="rail-val ${v<0?'down':''}" style="font-size:${i===arr.length-1?'15px':'12px'}">${money(v)}</span></div>`).join('')}
function alertsHtml(){const low=state.parts.filter(p=>p.stock<=2&&p.type!=='บริการ'), overdue=state.jobs.filter(j=>j.dueDate&&j.dueDate<today()&&!['ส่งมอบแล้ว','ยกเลิก'].includes(j.status)), ar=state.jobs.filter(j=>jobTotal(j)>num(j.paidAmount));const arr=[];low.forEach(p=>arr.push(['#f59e0b',`อะไหล่ใกล้หมด: ${p.name} เหลือ ${p.stock} ${p.unit}`]));overdue.forEach(j=>arr.push(['#dc2626',`งานเลยกำหนดรับรถ: ${j.id} นัด ${thDate(j.dueDate)}`]));ar.slice(0,3).forEach(j=>arr.push(['#dc2626',`ลูกหนี้ค้างรับ: ${j.id} คงเหลือ ${money(jobTotal(j)-num(j.paidAmount))}`]));return arr.length?arr.slice(0,7).map(a=>`<div class="alert"><div class="alert-dot" style="background:${a[0]}"></div><div class="alert-text">${a[1]}</div></div>`).join(''):'<div class="empty">ยังไม่มีแจ้งเตือนสำคัญ</div>'}
function saveSettings(e){e.preventDefault();const f=new FormData(e.target);Object.assign(state.settings,{company:f.get('company'),jobPrefix:f.get('jobPrefix'),account1:f.get('account1'),account2:f.get('account2'),taxRate:num(f.get('taxRate')),reservePct:num(f.get('reservePct'))});log('บันทึกตั้งค่าระบบ');save();render();toast('บันทึกตั้งค่าแล้ว')}
function globalFind(){const q=document.getElementById('globalSearch').value.toLowerCase().trim();if(!q)return;const j=state.jobs.find(j=>{const c=customer(j.customerId),v=vehicle(j.vehicleId);return [j.id,c.name,c.phone,v.plate,v.model].join(' ').toLowerCase().includes(q)});if(j){selectJob(j.id);return}toast('ไม่พบข้อมูลที่ค้นหา')}
function clearLogs(){state.logs=[];save();render()}
function resetDemo(){if(!confirm('รีเซ็ตกลับข้อมูลตัวอย่างทั้งหมด?'))return;state=structuredClone(defaultState);save();render();toast('รีเซ็ตแล้ว')}
function exportJSON(){download('maztech-backup.json',JSON.stringify(state,null,2),'application/json')}
function importJSONPrompt(){const raw=prompt('วาง JSON backup ที่เคย Export ไว้'); if(!raw)return;try{state=JSON.parse(raw);save();render();toast('นำเข้าข้อมูลแล้ว')}catch(e){toast('JSON ไม่ถูกต้อง')}}
function exportCSV(type){let rows=[],name=type+'.csv'; if(type==='jobs'){rows=[['Job No','Date','Plate','Customer','Phone','Model','Status','Payment','Total','Paid','Mechanic']].concat(state.jobs.map(j=>{const c=customer(j.customerId),v=vehicle(j.vehicleId);return [j.id,j.dateIn,v.plate,c.name,c.phone,v.model,j.status,j.payment,jobTotal(j),j.paidAmount,j.mechanic]}));} if(type==='parts'){rows=[['Part No','Name','Type','Unit','Cost','Sell','Stock','Supplier']].concat(state.parts.map(p=>[p.partNo,p.name,p.type,p.unit,p.cost,p.sell,p.stock,p.supplier]));} if(type==='customers'){rows=[['Name','Phone','Line','Type']].concat(state.customers.map(c=>[c.name,c.phone,c.line,c.type]));} if(type==='cashflow'){rows=[['Date','Account','Direction','Category','Desc','Amount','Ref']].concat(state.cashflow.map(x=>[x.date,x.account,x.direction,x.category,x.desc,x.amount,x.ref]));} download(name,rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')).join('\n'),'text/csv;charset=utf-8')}
function download(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function openModal(t,b){document.getElementById('modalTitle').textContent=t;document.getElementById('modalBody').innerHTML=b;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function field(label,name,type='text',ph=''){return `<div class="field"><label>${label}</label><input name="${name}" type="${type}" placeholder="${ph}" ${type==='date'&&ph?'value="'+ph+'"':''}></div>`}
function fieldVal(label,name,val,type='text'){return `<div class="field"><label>${label}</label><input name="${name}" type="${type}" value="${String(val??'').replaceAll('"','&quot;')}"></div>`}
function selectField(label,name,arr,val=''){return `<div class="field"><label>${label}</label><select name="${name}">${arr.map(x=>`<option ${String(x)===String(val)?'selected':''}>${x}</option>`).join('')}</select></div>`}
function info(k,v){return `<div><div class="info-label">${k}</div><div class="info-val">${v}</div></div>`}
function jobStatuses(){return ['รับรถเข้า','ตรวจเช็ก','รออะไหล่','กำลังซ่อม','พร้อมส่งมอบ','ส่งมอบแล้ว','ยกเลิก']}
function payStatuses(){return ['ยังไม่ชำระ','มัดจำแล้ว','ชำระบางส่วน','ชำระครบ','ค้างชำระ']}
function statusColor(s){return {'รับรถเข้า':'#1e6fc4','ตรวจเช็ก':'#0f766e','รออะไหล่':'#f59e0b','กำลังซ่อม':'#c2410c','พร้อมส่งมอบ':'#7c3aed','ส่งมอบแล้ว':'#059669','ยกเลิก':'#64748b'}[s]||'#64748b'}
function timelineClass(cur,s){const a=jobStatuses(),ci=a.indexOf(cur),si=a.indexOf(s);return si<ci?'done':si===ci?'active':''}
function toggleTheme(){document.body.classList.toggle('x')}
render(); if(document.getElementById('customerList')) renderCustomerList(); autoSyncFromApi();
const oldRender=render; render=function(){oldRender(); if(state.page==='customers') setTimeout(renderCustomerList,0)};
</script>
</body>
</html>
