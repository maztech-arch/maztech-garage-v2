const thDate=s=>{if(!s)return'-';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit'})};
const ym=s=>(s||today()).slice(0,7);
const uid=p=>p+'-'+Date.now().toString(36).slice(-4).toUpperCase()+Math.random().toString(36).slice(2,6).toUpperCase();

const PAY_STATUSES=['ยังไม่ชำระ','มัดจำแล้ว','ชำระบางส่วน','ชำระครบ','ค้างชำระ'];
const CF_CATS=['รายรับ-งานซ่อม','รายรับ-ขายอะไหล่','รายรับ-อื่นๆ','ทุนเริ่มต้น','ต้นทุน-อะไหล่','ค่าแรงช่าง','ค่าเช่า','ค่าน้ำไฟ','ค่าใช้จ่าย-อุปกรณ์','ค่าใช้จ่าย-การตลาด','ถอนหุ้นส่วน','แบ่งผลกำไร','อื่นๆ'];
const defaultState={page:'dashboard',selectedJobId:'MT-0001',dark:false,settings:{company:'Maztech Garage',jobPrefix:'MT',taxRate:0,account1:'KBank-225 รับ',account2:'KBank-051 จ่าย',opening1:0,opening2:0,reservePct:30,apiUrl:CONFIG.API_URL,shopPhone:'',ownerName:'เอ'},dashboard:{},parts:[{id:'P-001',partNo:'SH01-20303',name:'DPF Filter Assembly CX-5',type:'แท้',category:'เครื่องยนต์/ไอเสีย',unit:'ชิ้น',cost:12400,sell:16800,stock:2,minStock:1,supplier:'PSS'},{id:'P-002',partNo:'PE01-14302',name:'น้ำมันเครื่อง Mazda Original 5W-30',type:'แท้',category:'ของเหลว',unit:'ลิตร',cost:380,sell:480,stock:24,minStock:6,supplier:'พระนคร เซลส์'},{id:'P-003',partNo:'RF7W-20300',name:'ล้าง EGR / บริการ',type:'บริการ',category:'บริการ',unit:'งาน',cost:0,sell:800,stock:999,minStock:0,supplier:'ภายใน'}],customers:[{id:'C-001',name:'คุณพรรณี สุขสม',phone:'089-876-5432',line:'@pannee_s',type:'VIP',note:''},{id:'C-002',name:'คุณวิชัย ทองดี',phone:'081-234-5678',line:'-',type:'ทั่วไป',note:''}],vehicles:[{id:'V-001',customerId:'C-001',plate:'ชม-5678',brand:'Mazda',model:'CX-5 2.0S',year:'2021',vin:'-',color:'เทา',mileage:82450},{id:'V-002',customerId:'C-002',plate:'กข-1234',brand:'Mazda',model:'Mazda2 1.3E',year:'2020',vin:'-',color:'แดง',mileage:120400}],jobs:[{id:'MT-0001',reNo:'RE0001',dateIn:today(),dueDate:today(),dateOut:'',customerId:'C-001',vehicleId:'V-001',status:'รออะไหล่',payment:'ค้างชำระ',paidAmount:0,mechanic:'สุทธินนท์',symptom:'ไฟแจ้งเตือน DPF ขึ้น เครื่องยนต์อ่อนแรงลง',diagnosis:'DPF อุดตัน แนะนำเปลี่ยนพร้อมล้าง EGR',internalNote:'รออะไหล่',items:[{id:'JI-001',partId:'P-001',name:'DPF Filter Assembly CX-5',qty:1,cost:12400,sell:16800,type:'แท้'},{id:'JI-002',partId:'P-003',name:'ล้าง EGR / บริการ',qty:1,cost:0,sell:800,type:'บริการ'}]},{id:'MT-0002',reNo:'RE0002',dateIn:today(),dueDate:'',dateOut:'',customerId:'C-002',vehicleId:'V-002',status:'กำลังซ่อม',payment:'มัดจำแล้ว',paidAmount:5000,mechanic:'ภควัต',symptom:'เครื่องสั่น ควันดำ',diagnosis:'ตรวจพบเขม่าเยอะ',internalNote:'รอแจ้งราคาสุดท้าย',items:[{id:'JI-003',partId:'P-002',name:'น้ำมันเครื่อง Mazda Original 5W-30',qty:4,cost:380,sell:480,type:'แท้'},{id:'JI-004',partId:'LAB',name:'ค่าแรงตรวจเช็กและล้างระบบ',qty:1,cost:0,sell:10880,type:'บริการ'}]}],cashflow:[{id:'CF-001',date:today(),account:'KBank-225 รับ',direction:'IN',category:'รายรับ-งานซ่อม',desc:'มัดจำ MT-0002',amount:5000,ref:'MT-0002'}],logs:[{at:new Date().toLocaleString('th-TH'),text:'สร้างระบบ Maztech Garage Web App V2 MVP'}]};
function clone(o){return JSON.parse(JSON.stringify(o))}
function merge(a,b){if(!b||typeof b!=='object')return a;Object.keys(b).forEach(k=>{if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])&&a[k]&&typeof a[k]==='object'&&!Array.isArray(a[k]))a[k]=merge(a[k],b[k]);else a[k]=b[k]});return a}
function normalize(s){s=merge(clone(defaultState),s||{});['parts','customers','vehicles','jobs','cashflow','logs'].forEach(k=>{if(!Array.isArray(s[k]))s[k]=[]});s.jobs.forEach(j=>{if(!Array.isArray(j.items))j.items=[];if(!j.reNo)j.reNo=nextReNo(s.jobs);j.payment=derivePayment(j)});if(!s.selectedJobId&&s.jobs[0])s.selectedJobId=s.jobs[0].id;return s}
function load(){try{const raw=localStorage.getItem(KEY);if(raw)return normalize(JSON.parse(raw))}catch(e){console.warn(e)}return normalize(clone(defaultState))}
let state=load();
function save(){localStorage.setItem(KEY,JSON.stringify(state));syncLegacyBrief()}
function log(t){state.logs.unshift({at:new Date().toLocaleString('th-TH'),text:t});state.logs=state.logs.slice(0,300);save()}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function jobTotal(j){return (j.items||[]).reduce((s,i)=>s+num(i.qty)*num(i.sell),0)}
function jobCost(j){return (j.items||[]).reduce((s,i)=>s+num(i.qty)*num(i.cost),0)}
function jobGp(j){const t=jobTotal(j);return t?((t-jobCost(j))/t*100):0}
function jobBalance(j){return Math.max(0,jobTotal(j)-num(j.paidAmount))}
function derivePayment(j){const t=jobTotal(j),p=num(j.paidAmount);if(t<=0)return'ยังไม่ชำระ';if(p>=t)return'ชำระครบ';if(p>0)return'ชำระบางส่วน';return j.payment==='ค้างชำระ'?'ค้างชำระ':'ยังไม่ชำระ'}
function refreshPayments(){state.jobs.forEach(j=>j.payment=derivePayment(j))}
function customer(id){return state.customers.find(x=>x.id===id)||{name:'-',phone:'-',line:'-',type:'-',note:''}}
function vehicle(id){return state.vehicles.find(x=>x.id===id)||{plate:'-',model:'-',brand:'-',year:'-',mileage:0}}
function part(id){return state.parts.find(x=>x.id===id)}
function statusBadge(s){const m={'รับรถเข้า':'b-blue','ตรวจเช็ก':'b-teal','รออะไหล่':'b-yellow','กำลังซ่อม':'b-orange','พร้อมส่งมอบ':'b-purple','ส่งมอบแล้ว':'b-green','ยกเลิก':'b-gray'};return `<span class="badge ${m[s]||'b-gray'}">${esc(s)}</span>`}
function payBadge(s){const m={'ยังไม่ชำระ':'b-gray','มัดจำแล้ว':'b-yellow','ชำระบางส่วน':'b-orange','ชำระครบ':'b-green','ค้างชำระ':'b-red'};return `<span class="badge ${m[s]||'b-gray'}">${esc(s)}</span>`}
function statusColor(s){return {'รับรถเข้า':'#1e6fc4','ตรวจเช็ก':'#0f766e','รออะไหล่':'#f59e0b','กำลังซ่อม':'#c2410c','พร้อมส่งมอบ':'#7c3aed','ส่งมอบแล้ว':'#059669','ยกเลิก':'#64748b'}[s]||'#64748b'}
function go(p){state.page=p;save();render()}
function selectJob(id){state.selectedJobId=id;state.page='detail';save();render()}
function renderNav(){let html='';menus.forEach(m=>{if(['main','ops','system'].includes(m[0]))html+=`<div class="nav-section">${m[1]}</div>`;else html+=`<div class="nav-item ${state.page===m[0]?'active':''}" onclick="go('${m[0]}')"><span>${m[1]}</span>${m[0]==='jobs'?`<span class="nav-badge">${state.jobs.length}</span>`:''}</div>`});document.getElementById('nav').innerHTML=html}

(state.settings.account1)),'บัญชีรับ')}${kpi('🏦',state.settings.account2,money(accountBal(state.settings.account2)),'บัญชีจ่าย')}${kpi('🟢','รายรับเดือนนี้',money(sumCF('IN',ym(today()))),'Cashflow IN')}${kpi('🔴','รายจ่ายเดือนนี้',money(sumCF('OUT',ym(today()))),'Cashflow OUT')}</div><div class="card" style="margin-top:14px"><div class="card-body"><div class="table-wrap"><table><thead><tr><th>วันที่</th><th>บัญชี</th><th>ประเภท</th><th>หมวดหมู่</th><th>รายละเอียด</th><th>Ref</th><th class="right">รับเข้า</th><th class="right">จ่ายออก</th><th class="right">Signed</th><th>จัดการ</th></tr></thead><tbody id="cfTable"></tbody></table></div></div></div>`},reports(){const m=ym(today());return `<div class="page-head"><div><div class="eyebrow">REPORTS / EXPORT</div><div class="page-title">รายงาน / Export</div><div class="page-sub">ดึงข้อมูลจากงานซ่อมและ Cashflow จริงในระบบ</div></div><div class="actions"><button class="btn out" onclick="exportJSON()">Export JSON</button><button class="btn out" onclick="exportCSV('jobs')">Jobs CSV</button><button class="btn out" onclick="exportCSV('cashflow')">Cashflow CSV</button></div></div><div class="card"><div class="card-body"><div class="toolbar"><input id="reportMonth" type="month" value="${m}" onchange="renderReportSummary();renderMonthReportTable()"><button class="btn primary" onclick="renderReportSummary();renderMonthReportTable()">คำนวณรายงาน</button></div><div id="reportSummary">${reportSummaryHtml(m)}</div></div></div><div class="card" style="margin-top:14px"><div class="card-head"><div class="card-title">สรุปรายเดือน</div></div><div class="card-body"><div class="table-wrap"><table><thead><tr><th>เดือน</th><th class="right">Job</th><th class="right">ยอดขายงานซ่อม</th><th class="right">ต้นทุน</th><th class="right">กำไรขั้นต้น</th><th class="right">รายจ่าย Cashflow</th><th class="right">กำไรสุทธิประมาณ</th></tr></thead><tbody id="monthReportTable"></tbody></table></div></div></div>`},audit(){return `<div class="page-head"><div><div class="eyebrow">AUDIT LOG</div><div class="page-title">Audit Log</div><div class="page-sub">บันทึกการทำงานสำคัญในระบบ</div></div><div class="actions"><button class="btn danger" onclick="clearLogs()">ล้าง Log</button></div></div><div class="card"><div class="card-body"><div class="table-wrap"><table><thead><tr><th>เวลา</th><th>รายละเอียด</th></tr></thead><tbody>${state.logs.map(x=>`<tr><td class="mono">${esc(x.at)}</td><td>${esc(x.text)}</td></tr>`).join('')||'<tr><td colspan="2" class="empty">ยังไม่มี Log</td></tr>'}</tbody></table></div></div></div>`},settings(){return `<div class="page-head"><div><div class="eyebrow">SYSTEM SETTINGS</div><div class="page-title">ตั้งค่าระบบ</div><div class="page-sub">ค่าทั้งหมดบันทึกใน localStorage และเตรียมใช้ต่อกับ Google Sheets + Apps Script</div></div></div><div class="grid two"><div class="card"><div class="card-head"><div class="card-title">ตั้งค่าทั่วไป</div></div><div class="card-body"><form onsubmit="saveSettings(event)"><div class="form-grid">${fieldVal('ชื่ออู่','company',state.settings.company)}${fieldVal('ชื่อเจ้าของ/ผู้ใช้','ownerName',state.settings.ownerName||'เอ')}${fieldVal('เบอร์อู่','shopPhone',state.settings.shopPhone||'')}${fieldVal('Prefix Job','jobPrefix',state.settings.jobPrefix)}${fieldVal('บัญชีรับเงิน','account1',state.settings.account1)}${fieldVal('ยอดยกมา บัญชีรับ','opening1',state.settings.opening1||0,'number')}${fieldVal('บัญชีจ่ายเงิน','account2',state.settings.account2)}${fieldVal('ยอดยกมา บัญชีจ่าย','opening2',state.settings.opening2||0,'number')}${fieldVal('เงินสำรอง %','reservePct',state.settings.reservePct,'number')}${fieldVal('Vat / Tax %','taxRate',state.settings.taxRate,'number')}${fieldVal('Apps Script Web App URL','apiUrl',state.settings.apiUrl||CONFIG.API_URL,'text','https://script.google.com/macros/s/.../exec','full')}</div><div style="margin-top:14px" class="actions"><button class="btn primary">บันทึกตั้งค่า</button><button type="button" class="btn out" onclick="syncNow()">ทดสอบดึงข้อม function kpi(ic,label,val,sub){return `<div class="card kpi"><div class="kpi-ic">${ic}</div><div class="kpi-label">${label}</div><div class="kpi-val mono">${val}</div><div class="kpi-sub">${sub||''}</div></div>`}
function monthBars(){let out=[],d=new Date();for(let i=5;i>=0;i--){let dt=new Date(d.getFullYear(),d.getMonth()-i,1),m=dt.toISOString().slice(0,7),rev=state.jobs.filter(j=>ym(j.dateIn)===m).reduce((s,j)=>s+jobTotal(j),0);out.push({m,rev})}const max=Math.max(1,...out.map(x=>x.rev));return out.map(x=>`<div class="bar-row"><div class="bar-label">${x.m}</div><div class="track"><div class="fill" style="width:${x.rev/max*100}%"></div></div><div class="bar-val mono">${money(x.rev)}</div></div>`).join('')}
function latestJobsRows(){return state.jobs.slice().sort((a,b)=>String(b.dateIn).localeCompare(String(a.dateIn))).slice(0,7).map(j=>{let c=customer(j.customerId),v=vehicle(j.vehicleId);return `<tr><td class="mono">${esc(j.id)}</td><td class="mono">${esc(j.reNo||'-')}</td><td>${esc(c.name)}</td><td><span class="plate">${esc(v.plate)}</span></td><td>${statusBadge(j.status)}</td><td class="right mono">${money(jobTotal(j))}</td><td class="right mono down">${money(jobBalance(j))}</td></tr>`}).join('')||'<tr><td colspan="7" class="empty">ยังไม่มีงานซ่อม</td></tr>'}
function renderJobTable(){const q=(document.getElementById('jobQ')?.value||'').toLowerCase(),sq=document.getElementById('jobStatusQ')?.value||'',pq=document.getElementById('jobPayQ')?.value||'';document.getElementById('jobTable').innerHTML=state.jobs.filter(j=>{const c=customer(j.customerId),v=vehicle(j.vehicleId),txt=[j.id,j.reNo,c.name,c.phone,v.plate,v.model,j.status,j.payment].join(' ').toLowerCase();return(!q||txt.includes(q))&&(!sq||j.status===sq)&&(!pq||j.payment===pq)}).sort((a,b)=>String(b.dateIn).localeCompare(String(a.dateIn))).map(j=>{const c=customer(j.customerId),v=vehicle(j.vehicleId),gp=jobTotal(j)-jobCost(j);return `<tr><td>${thDate(j.dateIn)}</td><td><span class="mono">${esc(j.id)}</span><br><span class="mono">${esc(j.reNo||'-')}</span></td><td>${esc(c.name)}<br><span class="page-sub">${esc(c.phone)}</span></td><td><span class="plate">${esc(v.plate)}</span><br><span class="page-sub">${esc(v.model)}</span></td><td>${statusBadge(j.status)}</td><td>${payBadge(j.payment)}</td><td class="right mono">${money(jobTotal(j))}</td><td class="right mono ${gp<0?'down':'up'}">${money(gp)}</td><td class="right mono down">${money(jobBalance(j))}</td><td><button class="btn out sm" onclick="selectJob('${j.id}')">รายละเอียด</button> <button class="btn primary sm" onclick="receivePayment('${j.id}')">รับเงิน</button> <button class="btn warn sm" onclick="duplicateJob('${j.id}')">ทำซ้ำ</button> <button class="btn danger sm" onclick="deleteJob('${j.id}')">ลบ</button></td></tr>`}).join('')||'<tr><td colspan="10" class="empty">ไม่พบข้อมูล</td></tr>'}
function nextJobId(){let max=0,p=state?.settings?.jobPrefix||'MT';(state?.jobs||[]).forEach(j=>{let m=String(j.id||'').match(/(\d+)$/);if(m)max=Math.max(max,num(m[1]))});return p+'-'+String(max+1).padStart(4,'0')}
function nextReNo(jobs=state.jobs){let max=0;(jobs||[]).forEach(j=>{let m=String(j.reNo||'').match(/RE(\d+)/i);if(m)max=Math.max(max,num(m[1]))});return 'RE'+String(max+1).padStart(4,'0')}
function saveJob(e){e.preventDefault();const f=new FormData(e.target),plate=(f.get('plate')||'').trim(),custName=(f.get('customer')||'').trim();if(!plate||!custName){toast('กรุณากรอกชื่อลูกค้าและทะเบียนรถ');return}const cId=ensureCustomer(custName,f.get('phone'),f.get('line'),f.get('custType')),vId=ensureVehicle(cId,plate,f.get('brand'),f.get('model'),f.get('year'),f.get('vin'),f.get('color'),f.get('mileage'));const j={id:f.get('jobId')||nextJobId(),reNo:f.get('reNo')||nextReNo(),dateIn:f.get('dateIn')||today(),dueDate:f.get('dueDate')||'',dateOut:'',customerId:cId,vehicleId:vId,status:f.get('status')||'รับรถเข้า',payment:f.get('payment')||'ยังไม่ชำระ',paidAmount:num(f.get('paidAmount')),mechanic:f.get('mechanic')||'',symptom:f.get('symptom')||'',diagnosis:f.get('diagnosis')||'',internalNote:f.get('internalNote')||'',items:[]};state.jobs.push(j);if(j.paidAmount>0)addCF({date:j.dateIn,account:state.settings.account1,direction:'IN',category:'รายรับ-งานซ่อม',desc:'รับเงินตอนเปิดจ๊อบ '+j.id,amount:j.paidAmount,ref:j.id},false);state.selectedJobId=j.id;log('เปิดจ๊อบใหม่ '+j.id+' / '+plate);save();toast('เปิดจ๊อบสำเร็จ');go('detail')}
function ensureCustomer(name,phone,line,type){let c=state.customers.find(x=>(phone&&x.phone===phone)||x.name===name);if(c){Object.assign(c,{name,phone:phone||c.phone,line:line||c.line,type:type||c.type});return c.id}c={id:uid('C'),name,phone:phone||'',line:line||'',type:type||'ทั่วไป',note:''};state.customers.push(c);return c.id}
function ensureVehicle(customerId,plate,brand,model,year,vin,color,mileage){let v=state.vehicles.find(x=>x.plate===plate);if(v){Object.assign(v,{customerId,brand:brand||v.brand,model:model||v.model,year:year||v.year,vin:vin||v.vin,color:color||v.color,mileage:num(mileage)||v.mileage});return v.id}v={id:uid('V'),customerId,plate,brand:brand||'Mazda',model:model||'',year:year||'',vin:vin||'',color:color||'',mileage:num(mileage)};state.vehicles.push(v);return v.id}
function deleteJob(id){if(!confirm('ลบงาน '+id+' ?'))return;state.jobs=state.jobs.filter(j=>j.id!==id);state.cashflow=state.cashflow.filter(x=>x.ref!==id);log('ลบงาน '+id);save();go('jobs')}
function duplicateJob(id){const old=state.jobs.find(j=>j.id===id);if(!old)return;const j=clone(old);j.id=nextJobId();j.reNo=nextReNo();j.dateIn=today();j.dueDate='';j.dateOut='';j.status='รับรถเข้า';j.payment='ยังไม่ชำระ';j.paidAmount=0;j.items=(j.items||[]).map(i=>Object.assign({},i,{id:uid('JI')}));state.jobs.push(j);state.selectedJobId=j.id;log('ทำซ้ำงานจาก '+id+' เป็น '+j.id);save();toast('สร้างงานซ้ำแล้ว');go('detail')}
function openEditJob(id){const j=state.jobs.find(x=>x.id===id);if(!j)return;openModal('แก้ไข Job '+id,`<form onsubmit="saveEditJob(event,'${id}')"><div class="form-grid">${fieldVal('RE No','reNo',j.reNo)}${fieldVal('วันที่รับ','dateIn',j.dateIn,'date')}${fieldVal('กำหนดส่ง','dueDate',j.dueDate,'date')}${fieldVal('วันที่ส่งมอบ','dateOut',j.dateOut,'date')}${selectField('สถานะ','status',STATUSES,j.status)}${selectField('ชำระเงิน','payment',PAY_STATUSES,j.payment)}${fieldVal('ยอดชำระแล้ว','paidAmount',j.paidAmount,'number')}${fieldVal('ช่าง','mechanic',j.mechanic)}${textareaField('อาการ','symptom',j.symptom,'full')}${textareaField('ผลตรวจ','diagnosis',j.diagnosis,'full')}${textareaField('หมายเหตุ','internalNote',j.internalNote,'full')}</div><div class="actions" style="margin-top:14px"><button class="btn primary">บันทึก</button></div></form>`)}
function saveEditJob(e,id){e.preventDefault();const f=new FormData(e.target),j=state.jobs.find(x=>x.id===id);if(!j)return;['reNo','dateIn','dueDate','dateOut','status','payment','mechanic','symptom','diagnosis','internalNote'].forEach(k=>j[k]=f.get(k));j.paidAmount=num(f.get('paidAmount'));log('แก้ไข Job '+id);save();closeModal();render();toast('บันทึก Job แล้ว')}

function openAddItem(jobId){const opts=state.parts.map(p=>`<option value="${p.id}">${esc(p.partNo)} · ${esc(p.name)} · Stock ${num(p.stock)}</option>`).join('');openModal('เพิ่มรายการใน Job',`<form onsubmit="saveJobItem(event,'${jobId}')"><div class="form-grid">${selectField('ประเภท','type',['แท้','OEM','เทียบ','บริการ','ค่าแรง','อื่นๆ'],'บริการ')}<div class="field"><label>เลือกจาก Parts Master</label><select name="partId" onchange="fillPartToForm(this)"><option value="">ไม่เลือก</option>${opts}</select></div>${fieldVal('รายการ','name','','text','ชื่ออะไหล่ / ค่าแรง','full')}${fieldVal('จำนวน','qty',1,'number')}${fieldVal('ต้นทุน/หน่วย','cost',0,'number')}${fieldVal('ขาย/หน่วย','sell',0,'number')}</div><div class="actions" style="margin-top:14px"><button class="btn primary">เพิ่มรายการ</button></div></form>`)}

function saveJobItem(e,jobId){e.preventDefault();const f=new FormData(e.target),j=state.jobs.find(x=>x.id===jobId);if(!j)return;const partId=f.get('partId'),qty=num(f.get('qty'))||1,item={id:uid('JI'),partId,name:f.get('name'),qty,cost:num(f.get('cost')),sell:num(f.get('sell')),type:f.get('type')};if(!item.name){toast('กรุณากรอกรายการ');return}j.items.push(item);const p=part(partId);if(p&&p.type!=='บริการ')p.stock=num(p.stock)-qty;log('เพิ่มรายการ '+item.name+' ใน '+jobId);save();closeModal();render();toast('เพิ่มรายการแล้ว')}
function itemRows(j){return (j.items||[]).map(i=>{const cost=num(i.qty)*num(i.cost),sell=num(i.qty)*num(i.sell),gp=sell-cost;return `<tr><td><span class="badge b-blue">${esc(i.type||'-')}</span></td><td>${esc(i.name)}</td><td class="right mono">${num(i.qty)}</td><td class="right mono">${money(i.cost)}</td><td class="right mono">${money(i.sell)}</td><td class="right mono">${money(cost)}</td><td class="right mono">${money(sell)}</td><td class="right mono ${gp<0?'down':'up'}">${money(gp)}</td><td><button class="btn danger sm" onclick="deleteItem('${j.id}','${i.id||i.name}')">ลบ</button></td></tr>`}).join('')||'<tr><td colspan="9" class="empty">ยังไม่มีรายการซ่อม</td></tr>'}
function deleteItem(jobId,itemId){const j=state.jobs.find(x=>x.id===jobId);if(!j)return;const idx=j.items.findIndex(i=>(i.id||i.name)===itemId);if(idx<0)return;if(!confirm('ลบรายการนี้?'))return;const item=j.items[idx];if(item.partId){const p=part(item.partId);if(p&&p.type!=='บริการ')p.stock=num(p.stock)+num(item.qty)}j.items.splice(idx,1);log('ลบรายการใน '+jobId);save();render()}
function receivePayment(jobId){const j=state.jobs.find(x=>x.id===jobId);if(!j)return;const amt=num(prompt('รับชำระจำนวนเท่าไร?',jobBalance(j)||jobTotal(j)));if(amt<=0)return;j.paidAmount=num(j.paidAmount)+amt;j.payment=derivePayment(j);addCF({date:today(),account:state.settings.account1,direction:'IN',category:'รายรับ-งานซ่อม',desc:'รับชำระ '+j.id,amount:amt,ref:j.id},false);log('รับชำระ '+money(amt)+' จาก '+j.id);save();render();toast('รับชำระและลง Cashflow แล้ว')}

function openVehicleForm(customerId,vid=''){const v=vid?vehicle(vid):{plate:'',brand:'Mazda',model:'',year:'',vin:'',color:'',mileage:0};openModal(vid?'แก้ไขรถ':'เพิ่มรถให้ลูกค้า',`<form onsubmit="saveVehicle(event,'${customerId}','${vid}')"><div class="form-grid">${fieldVal('ทะเบียน','plate',v.plate)}${fieldVal('ยี่ห้อ','brand',v.brand)}${fieldVal('รุ่น','model',v.model)}${fieldVal('ปี','year',v.year,'number')}${fieldVal('VIN','vin',v.vin)}${fieldVal('สี','color',v.color)}${fieldVal('เลขไมล์','mileage',v.mileage,'number')}</div><div class="actions" style="margin-top:14px"><button class="btn primary">บันทึกรถ</button></div></form>`)}
function saveVehicle(e,customerId,vid){e.preventDefault();const f=new FormData(e.target);let v=vid?state.vehicles.find(x=>x.id===vid):{id:uid('V'),customerId};Object.assign(v,{customerId,plate:f.get('plate'),brand:f.get('brand'),model:f.get('model'),year:f.get('year'),vin:f.get('vin'),color:f.get('color'),mileage:num(f.get('mileage'))});if(!vid)state.vehicles.push(v);log((vid?'แก้ไข':'เพิ่ม')+'รถ '+v.plate);save();closeModal();render();toast('บันทึกรถแล้ว')}
function renderCustomerList(){const q=(document.getElementById('custQ')?.value||'').toLowerCase();const list=state.customers.filter(c=>{const vs=state.vehicles.filter(v=>v.customerId===c.id);return !q||[c.name,c.phone,c.line,c.type,...vs.map(v=>v.plate+' '+v.model)].join(' ').toLowerCase().includes(q)});document.getElementById('customerList').innerHTML=list.map(c=>{const vs=state.vehicles.filter(v=>v.customerId===c.id);return `<div class="card" style="margin-bottom:12px"><div class="card-head"><div><div class="card-title">${esc(c.name)} <span class="badge b-purple">${esc(c.type)}</span></div><div class="page-sub">${esc(c.phone)} · ${esc(c.line||'-')}</div></div><div class="actions"><button class="btn out sm" onclick="openCustomerForm('${c.id}')">แก้ลูกค้า</button><button class="btn primary sm" onclick="openVehicleForm('${c.id}')">+ เพิ่มรถ</button></div></div><div class="card-body"><div class="table-wrap"><table><thead><tr><th>ทะเบียน</th><th>รุ่นรถ</th><th>ปี</th><th class="right">ไมล์</th><th class="right">จำนวนงาน</th><th class="right">ยอดซ่อม</th><th>จัดการ</th></tr></thead><tbody>${vs.map(v=>{const js=state.jobs.filter(j=>j.vehicleId===v.id);return `<tr><td><span class="plate">${esc(v.plate)}</span></td><td>${esc(v.model)}</td><td>${esc(v.year)}</td><td class="right mono">${Number(v.mileage||0).toLocaleString()}</td><td class="right mono">${js.length}</td><td class="right mono">${money(js.reduce((s,j)=>s+jobTotal(j),0))}</td><td><button class="btn out sm" onclick="openVehicleForm('${c.id}','${v.id}')">แก้รถ</button></td></tr>`}).join('')||'<tr><td colspan="7" class="empty">ยังไม่มีรถ</td></tr>'}</tbody></table></div></div></div>`}).join('')||'<div class="empty">ไม่พบข้อมูล</div>'}
function accountBal(acc){let opening=acc===state.settings.account1?num(state.settings.opening1):acc===state.settings.account2?num(state.settings.opening2):0;return state.cashflow.filter(x=>x.account===acc).reduce((s,x)=>s+(x.direction==='IN'?num(x.amount):-num(x.amount)),opening)}
function sumCF(dir,m=''){return state.cashflow.filter(x=>x.direction===dir&&(!m||ym(x.date)===m)).reduce((s,x)=>s+num(x.amount),0)}
function openCashflowForm(){openModal('เพิ่มรายรับ-รายจ่าย',`<form onsubmit="saveCF(event)"><div class="form-grid">${fieldVal('วันที่','date',today(),'date')}${selectField('บัญชี','account',[state.settings.account1,state.settings.account2])}${selectField('ประเภท','direction',['IN','OUT'])}${selectField('หมวดหมู่','category',CF_CATS)}${fieldVal('จำนวนเงิน','amount',0,'number')}${selectField('Ref Job','ref',['',...state.jobs.map(j=>j.id)])}${fieldVal('รายละเอียด','desc','')}</div><div class="actions" style="margin-top:14px"><button class="btn primary">บันทึก</button></div></form>`)}
function saveCF(e){e.preventDefault();const f=new FormData(e.target);addCF({date:f.get('date'),account:f.get('account'),direction:f.get('direction'),category:f.get('category'),desc:f.get('desc'),amount:num(f.get('amount')),ref:f.get('ref')},true);closeModal();render();toast('บันทึกรายการเงินแล้ว')}
function addCF(x,doSave=true){state.cashflow.push({id:uid('CF'),...x});if(doSave){log('เพิ่ม Cashflow '+x.direction+' '+money(x.amount)+' '+x.category);save()}}
function renderCashflowTable(){document.getElementById('cfTable').innerHTML=state.cashflow.slice().sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(x=>`<tr><td>${thDate(x.date)}</td><td>${esc(x.account)}</td><td>${x.direction==='IN'?'<span class="badge b-green">IN</span>':'<span class="badge b-red">OUT</span>'}</td><td>${esc(x.category)}</td><td>${esc(x.desc||'-')}</td><td class="mono">${esc(x.ref||'-')}</td><td class="right mono up">${x.direction==='IN'?money(x.amount):'-'}</td><td class="right mono down">${x.direction==='OUT'?money(x.amount):'-'}</td><td class="right mono">${money(x.direction==='IN'?x.amount:-x.amount)}</td><td><button class="btn danger sm" onclick="deleteCF('${x.id}')">ลบ</button></td></tr>`).join('')||'<tr><td colspan="10" class="empty">ยังไม่มี Cashflow</td></tr>'}
function deleteCF(id){if(!confirm('ลบรายการเงินนี้?'))return;state.cashflow=state.cashflow.filter(x=>x.id!==id);log('ลบรายการ Cashflow '+id);save();render()}
function reportSummaryHtml(m){const js=state.jobs.filter(j=>ym(j.dateIn)===m),rev=js.reduce((s,j)=>s+jobTotal(j),0),cost=js.reduce((s,j)=>s+jobCost(j),0),gp=rev-cost,out=sumCF('OUT',m),reserve=gp*num(state.settings.reservePct)/100;return `<div class="info-grid">${info('เดือน',m)}${info('จำนวน Job',js.length+' งาน')}${info('ยอดขายงานซ่อม',money(rev))}${info('ต้นทุนงาน',money(cost))}${info('กำไรขั้นต้น',money(gp))}${info('รายจ่าย Cashflow',money(out))}${info('เงินสำรอง '+state.settings.reservePct+'%',money(reserve))}${info('ปันผลประมาณ/คน',money((gp-reserve)/4))}</div>`}
function renderReportSummary(){const m=document.getElementById('reportMonth')?.value||ym(today());document.getElementById('reportSummary').innerHTML=reportSummaryHtml(m)}
function renderMonthReportTable(){const months=[...new Set([...state.jobs.map(j=>ym(j.dateIn)),...state.cashflow.map(x=>ym(x.date))])].filter(Boolean).sort().reverse();document.getElementById('monthReportTable').innerHTML=months.map(m=>{const js=state.jobs.filter(j=>ym(j.dateIn)===m),rev=js.reduce((s,j)=>s+jobTotal(j),cost=js.reduce((s,j)=>s+jobCost(j),0),gp=rev-cost,out=sumCF('OUT',m);return `<tr><td>${m}</td><td class="right mono">${js.length}</td><td class="right mono">${money(rev)}</td><td class="right mono">${money(cost)}</td><td class="right mono ${gp<0?'down':'up'}">${money(gp)}</td><td class="right mono down">${money(out)}</td><td class="right mono ${gp-out<0?'down':'up'}">${money(gp-out)}</td></tr>`}).join('')||'<tr><td colspan="7" class="empty">ยังไม่มีรายงาน</td></tr>'}
function info(k,v){return `<div><div class="info-label">${k}</div><div class="info-val">${v}</div></div>`}
function timelineClass(cur,s){const a=STATUSES.filter(x=>x!=='ยกเลิก'),ci=a.indexOf(cur),si=a.indexOf(s);return si<ci?'done':si===ci?'active':''}
function fieldVal(label,name,val='',type='text',ph='',cls=''){return `<div class="field ${cls}"><label>${label}</label><input name="${name}" type="${type}" value="${esc(val??'')}" placeholder="${esc(ph)}"></div>`}
function textareaField(label,name,val='',cls=''){return `<div class="field ${cls}"><label>${label}</label><textarea name="${name}">${esc(val??'')}</textarea></div>`}
function selectField(label,name,arr,val=''){return `<div class="field"><label>${label}</label><select name="${name}">${arr.map(x=>`<option value="${esc(x)}" ${String(x)===String(val)?'selected':''}>${esc(x||'-')}</option>`).join('')}</select></div>`}
function openModal(t,b){document.getElementById('modalTitle').textContent=t;document.getElementById('modalBody').innerHTML=b;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function globalFind(){const q=document.getElementById('globalSearch').value.toLowerCase().trim();if(!q)return;const j=state.jobs.find(j=>{const c=customer(j.customerId),v=vehicle(j.vehicleId);return [j.id,j.reNo,c.name,c.phone,v.plate,v.model].join(' ').toLowerCase().includes(q)});if(j){selectJob(j.id);return}toast('ไม่พบข้อมูลที่ค้นหา')}
function clearLogs(){if(!confirm('ล้าง Audit Log?'))return;state.logs=[];save();render()}
function resetDemo(){if(!confirm('รีเซ็ตกลับข้อมูลตัวอย่างทั้งหมด?'))return;state=clone(defaultState);save();render();toast('รีเซ็ตแล้ว')}
function clearAllLocal(){if(!confirm('ล้างข้อมูล localStorage ของแอปนี้ทั้งหมด?'))return;localStorage.removeItem(KEY);state=clone(defaultState);save();render();toast('ล้างข้อมูลแล้ว')}
function exportJSON(){download('maztech-backup.json',JSON.stringify(state,null,2),'application/json')}
function importJSONPrompt(){const raw=prompt('วาง JSON backup ที่เคย Export ไว้');if(!raw)return;try{state=normalize(JSON.parse(raw));save();render();toast('นำเข้าข้อมูลแล้ว')}catch(e){toast('JSON ไม่ถูกต้อง')}}
function exportCSV(type){let rows=[],name=type+'.csv';if(type==='jobs'){rows=[['Job No','RE No','Date','Plate','Customer','Phone','Model','Status','Payment','Total','Cost','GP','Paid','Balance','Mechanic']].concat(state.jobs.map(j=>{const c=customer(j.customerId),v=vehicle(j.vehicleId);return [j.id,j.reNo,j.dateIn,v.plate,c.name,c.phone,v.model,j.status,j.payment,jobTotal(j),jobCost(j),jobTotal(j)-jobCost(j),j.paidAmount,jobBalance(j),j.mechanic]}))}if(type==='parts'){rows=[['Part No','Name','Type','Category','Unit','Cost','Sell','Stock','Min Stock','Supplier']].concat(state.parts.map(p=>[p.partNo,p.name,p.type,p.category,p.unit,p.cost,p.sell,p.stock,p.minStock,p.supplier]))}if(type==='customers'){rows=[['Customer ID','Name','Phone','Line','Type','Vehicle ID','Plate','Model','Year','Mileage']].concat(state.vehicles.map(v=>{const c=customer(v.customerId);return [c.id,c.name,c.phone,c.line,c.type,v.id,v.plate,v.model,v.year,v.mileage]}))}if(type==='cashflow'){rows=[['Date','Account','Direction','Category','Desc','Amount','Ref']].concat(state.cashflow.map(x=>[x.date,x.account,x.direction,x.category,x.desc,x.amount,x.ref]))}download(name,rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')).join('\n'),'text/csv;charset=utf-8')}
function download(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function saveSettings(e){e.preventDefault();const f=new FormData(e.target);['company','ownerName','shopPhone','jobPrefix','account1','account2','apiUrl'].forEach(k=>state.settings[k]=f.get(k));['opening1','opening2','reservePct','taxRate'].forEach(k=>state.settings[k]=num(f.get(k)));log('บันทึกตั้งค่าระบบ');save();render();toast('บันทึกตั้งค่าแล้ว')}
function toggleTheme(){state.dark=!state.dark;save();render()}
function apiUrl(){return state.settings.apiUrl||CONFIG.API_URL}
function apiGet(action,params={}){const base=apiUrl();if(!base)return Promise.reject(new Error('ยังไม่ได้ตั้งค่า API URL'));return new Promise((resolve,reject)=>{const cb='mzcb_'+Date.now()+Math.random().toString(36).slice(2);const qs=new URLSearchParams({action,callback:cb,...params});const s=document.createElement('script');window[cb]=data=>{delete window[cb];s.remove();resolve(data)};s.onerror=()=>{delete window[cb];s.remove();reject(new Error('โหลดข้อมูลจาก Apps Script ไม่สำเร็จ'))};s.src=base+(base.includes('?')?'&':'?')+qs.toString();document.body.appendChild(s);setTimeout(()=>{if(window[cb]){delete window[cb];s.remove();reject(new Error('Apps Script timeout'))}},18000)})}
async function syncNow(){try{toast('กำลังดึงข้อมูลจากชีท...');const data=await apiGet(CONFIG.ACTIONS.appState);applyApiState(data);log('Sync ข้อมูลจาก Apps Script');save();render();toast('ดึงข้อมูลชีทสำเร็จ')}catch(err){console.warn(err);toast(err.message||'ดึงข้อมูลไม่สำเร็จ')}}
function applyApiState(payload){const d=payload?.data||payload||{};if(d.dashboard)state.dashboard=d.dashboard;if(Array.isArray(d.parts))state.parts=d.parts;if(Array.isArray(d.customers))state.customers=d.customers;if(Array.isArray(d.vehicles))state.vehicles=d.vehicles;if(Array.isArray(d.jobs))state.jobs=d.jobs;if(Array.isArray(d.cashflow))state.cashflow=d.cashflow;if(Array.isArray(d.logs))state.logs=d.logs;if(d.settings)state.settings=Object.assign(state.settings,d.settings);state=normalize(state)}
function syncLegacyBrief(){try{localStorage.setItem('mastech_records',JSON.stringify(state.jobs.map(j=>{const c=customer(j.customerId),v=vehicle(j.vehicleId);return{id:j.id,jobId:j.id,reNo:j.reNo,dateIn:j.dateIn,dateOut:j.dateOut,plate:v.plate,customer:c.name,phone:c.phone,model:v.model,mileage:v.mileage,desc:j.symptom,mechanic:j.mechanic,payStatus:j.payment,total:jobTotal(j),createdAt:j.dateIn}})))}catch(e){}}
render();
</script>
</body>
